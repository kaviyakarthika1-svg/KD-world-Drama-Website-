<!DOCTYPE html>
<html>

            background-color: #fff5f7;
        }

        h3 {
            text-align: center;
        }

            margin-left: 20px;
        }

        .genre-section {
            display: flex;
            gap: 15px;

        }

        .genre-section img {

        }

        .watch-btn {
            margin: 10px 20px;

            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .watch-btn:hover {
            background-color: #e63950;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 10px;
            background-color: #ffd6dc;
        }

</head>
