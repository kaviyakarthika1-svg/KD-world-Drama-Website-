<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD World - Login</title>
    
    <!-- External CSS -->git initial-scale
    <link rel="stylesheet" href="index.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23667eea'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14h-2v-6h2v6zm4 0h-2v-6h2v6z'/%3E%3C/svg%3E" type="image/svg+xml">
</head>
<body>
    

    <div class="login-wrapper">
        <form class="login-form" id="loginForm" action="/api/login" method="POST" novalidate>
            
            <!-- Welcome Message -->
            <p class="welcome-text">
                Welcome to the Wonderful Dramatic Universe 🌌
            </p>

            <h2 class="title">Welcome Back</h2>

            <!-- Email Input -->
            <div class="input-group">
                <label for="email">Email ID</label>
                <input 
                    type="email" 
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
                <div class="error-message" id="emailError">Please enter a valid email address</div>
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    minlength="6"
                >
                <div class="error-message" id="passwordError">Password must be at least 6 characters</div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe">
                    <span class="checkbox-text">Remember me</span>
                </label>
                <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn-login" id="loginBtn">
                Sign In
            </button>

            <!-- Divider -->
            <div class="divider">
                <span>OR</span>
            </div>

            <!-- Sign Up Link -->
            <nav class="signup-link">
                <a href="filex.html">Create a new account</a>
            </nav>

            <!-- Decorative Footer -->
            <p class="footer-text">
                There you go!! ✨
            </p>

        </form>
    </div>

    <!-- External JavaScript -->
    <script src="index.js"></script>
</body>
</html>
